<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Recarga de Celular</title>
  <link rel="stylesheet" type="text/css" href="F_Recarga.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
  </head>
<body>
  <div class="container">
    <h1>RECARGA DE CELULAR</h1>
    <input type="text" id="numero" placeholder="Número do celular">
    <select id="valor">
      <option value="">SELECIONE O VALOR</option>
      <option value="10">R$ 10</option>
      <option value="20">R$ 20</option>
      <option value="30">R$ 30</option>
      <option value="50">R$ 50</option>
    </select>
    <br>
    <button onclick="recargar()">CONFIRMAR</button>
    <button onclick="resetar()">RESETAR</button>

    <div class="mensagem" id="mensagem"></div>

    <div class="historico">
      <h2>HISTÓRICO DE RECARGAS</h2>
      <ul id="listaHistorico"></ul>
    </div>
  </div>
</body>
</html>
